services:
  arielbot:
    build: .
    image: arielbot:latest
    container_name: arielbot
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
    expose:
      - "8080"
    # ports:
    #   - "8080:8080"  # uncomment if you also want host access
    volumes:
      - ./.env.prod:/app/.env.prod:ro
      - ./data.sqlite:/app/data.sqlite
    networks:
      - bot-net

  # example sibling container — replace with your real one
  # napcat:
  #   image: mlikiowa/napcat-docker:latest
  #   restart: unless-stopped
  #   environment:
  #     ACCOUNT: "123456"
  #     WS_ENABLE: "false"
  #     HTTP_POST_ENABLE: "true"
  #     HTTP_POST_URLS: "http://arielbot:8080/onebot/v11/http"
  #   networks:
  #     - bot-net

networks:
  bot-net:
    driver: bridge
