services:
  arielbot:
    build: .
    image: arielbot:latest
    container_name: arielbot
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      ARIEL_DB_PATH: /app/data/data.sqlite
    expose:
      - "8080"
    # ports:
    #   - "8080:8080"  # uncomment if you also want host access
    volumes:
      - ./.env.prod:/app/.env.prod:ro
      - ./data:/app/data
      - ./Static:/app/Static
    networks:
      - bot-net

  lagrange-milky:
    image: ghcr.io/lagrangedev/lagrange.milky:main
    container_name: lagrange-milky
    restart: unless-stopped
    working_dir: /root
    stdin_open: true
    tty: true
    expose:
      - "3000"
    volumes:
      - ./lagrange:/root
    networks:
      - bot-net

networks:
  bot-net:
    driver: bridge
